name: Katabump Auto Renew

on:
  schedule:
    - cron: '22 1 * * *'
  workflow_dispatch:

jobs:
  auto_renew_katabump:
    runs-on: ubuntu-22.04
    env:
      ACCOUNTS: ${{ secrets.ACCOUNTS }}
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get update && sudo apt-get install -y xvfb
          sudo apt-get install -y libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2

      - uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: 149

      - name: Get Chromium Version
        id: get_version
        run: |
          echo "Checking Chrome installation..."
          INSTALL_PATH=$(which chrome)
          sudo ln -sf "$INSTALL_PATH" /opt/google/chrome/chrome
          sudo ln -sf "$INSTALL_PATH" /usr/bin/chromium-browser
          /usr/bin/chromium-browser --version
          CHROME_VERSION=$(chromium-browser --version 2>/dev/null | grep -oE '[0-9]+' | head -n 1 || true)
          if [ -z "$CHROME_VERSION" ]; then
            CHROME_VERSION=$(google-chrome --version 2>/dev/null | grep -oE '[0-9]+' | head -n 1 || true)
          fi
          if [ -z "$CHROME_VERSION" ]; then
            echo "无法自动检测浏览器版本，使用默认"
            CHROME_VERSION="144"
          fi
          echo "Detected Chrome Major Version: $CHROME_VERSION"
          echo "CHROME_VERSION=$CHROME_VERSION" >> $GITHUB_ENV

      - name: Start X Virtual Frame Buffer (Xvfb)
        run: Xvfb :99 -ac &

      - name: Run Renew Script (via Xvfb)
        env:
          DISPLAY: ':99'
          HEADLESS: 'false'
          HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
        run: python renew_katabump.py
