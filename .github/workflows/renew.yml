name: Auto Renew Katabump

on:
  schedule:
    - cron: '22 1 * * *'  # 每天 UTC 01:22 运行（北京时间 09:22）
  workflow_dispatch:       # 允许手动触发

jobs:
  pre-check:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.check.outputs.should_skip }}
    steps:
      - name: Interval Check (Strict 4-day cycle)
        id: check
        run: |
          DAYS=$(( $(date -u +%s) / 86400 ))
          REMAINDER=$(( $DAYS % 4 ))
          if [ $REMAINDER -ne 0 ]; then
            echo "should_skip=true" >> $GITHUB_OUTPUT
          else
            echo "should_skip=false" >> $GITHUB_OUTPUT
          fi

  auto_renew_katabump:
    needs: pre-check
    if: needs.pre-check.outputs.should_skip != 'true'
    runs-on: ubuntu-22.04
    env:
      ACCOUNTS: ${{ secrets.ACCOUNTS }}
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils xdotool scrot fonts-noto-cjk
          pip install seleniumbase requests

      - name: Install ChromeDriver
        run: |
          seleniumbase install chromedriver

      - name: Set up proxy (sing-box)
        continue-on-error: true
        env:
          NODE_LINK: ${{ secrets.NODE_LINK }}
        run: |
          bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh) || true

      - name: Run renewal script
        env:
          HEADLESS: 'false'
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python renew_katabump.py

      - name: Clean up old workflow runs
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs=$(gh run list --workflow="${{ github.workflow }}" --limit=100 \
            --json databaseId --jq '.[].databaseId')
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 1 ]; then
              echo "Deleting run: $run_id"
              gh run delete $run_id || true
            fi
          done